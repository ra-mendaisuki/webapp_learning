<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>掲示板のトップページ</title>
</head>
<body>
    <header>
        <!-- 「login_user_name」変数の値で差し替え -->
        <h1>
            {% if login_user_name %}
            掲示板のトップページ - {{ login_user_name }}さん
            {% else %}
            掲示板のトップページ - ゲストさん
            {% endif %}
        </h1>
        <!-- メニュー -->
        <nav>
            <ul>
                <li>
                    <!-- 「/」にアクセスするURLを作成 -->
                    <a href="{{ url_for('index') }}">トップページ</a>
                </li>
                <li>
                    <!-- 「/write」にアクセスするURLを作成 -->
                    <a href="{{ url_for('write') }}">書き込みページ</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        {% for message in message_list %}
        <article>
            <p>{{ message.id }} - {{ message.user_name }}</p>
            <p>{{ message.contents }}</p>
        </article>
        {% endfor %}
    </main>

</body>
</html>
